name: Build offline ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-offline-zip:
    name: Build Miditar offline ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build offline app
        run: npm run build:offline

      - name: Create ZIP
        run: |
          cd miditar-offline
          zip -r ../miditar-dist.zip .

      - name: Upload offline ZIP
        uses: actions/upload-artifact@v4
        with:
          name: miditar-dist
          path: miditar-dist.zip
          if-no-files-found: error

      - name: Refresh checked-in offline app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all miditar-offline
          if git diff --cached --quiet; then
            echo "Checked-in offline app is already current."
          else
            git commit -m "build: refresh Miditar Offline"
            git push origin HEAD:main
          fi
