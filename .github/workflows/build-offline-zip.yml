name: Build offline ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-offline-zip:
    name: Build Miditar offline ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build offline app
        run: npm run build:offline

      - name: Create ZIP
        run: |
          cd miditar-offline
          zip -r ../miditar-dist.zip .

      - name: Upload offline ZIP
        uses: actions/upload-artifact@v4
        with:
          name: miditar-dist
          path: miditar-dist.zip
          if-no-files-found: error
